<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>

    <!-- CSS. -->
    <link rel="stylesheet" href="../static/css/game.css">
    <link rel="stylesheet" href="../static/css/layout.css">
    <link rel="stylesheet" href="../static/css/components.css">

    <style>
        /* Popup overlay. */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
            z-index: 20;
        }

        /* Popup box. */
        .modal-box {
            width: 80%;
            max-width: 900px;
            background: white;
            border-radius: 14px;
            padding: 25px 35px;
            font-size: 22px;
            border: 3px solid #333;
            position: relative;
            font-family: "Patrick Hand", sans-serif;

            max-height: 80vh;
            /* ★ Allow content scroll. ★ */
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 36px;
            cursor: pointer;
        }

        .rules-lang-btn {
            padding: 6px 14px;
            margin-right: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 7px;
            border: none;
            background: #444;
            color: white;
        }
    </style>
</head>


<body>
<!-- Page name. -->
<header class="header-area">
    <h1 id="pageName" style="text-align:center; margin-top:12px; font-size:42px;"></h1>
</header>

<!-- ===== Top buttons. ===== -->
<section style="display:flex; justify-content:center; gap:80px; margin-top:5px;">
    <button id="introBtn" class="menu-btn"></button>
    <button id="rulesBtn" class="menu-btn"></button>
    <button id="incomeBtn" class="menu-btn"></button>
</section>


<!-- ================= Rules popup. ================= -->
<div id="rulesModal" class="modal-backdrop" onclick="closeRulesModal()">
    <div class="modal-box" onclick="event.stopPropagation()">

        <span class="modal-close" onclick="closeRulesModal()">✕</span>

        <h2 id="rulesTitle" style="margin-bottom:20px;"></h2>

        <div id="rulesLangButtons" style="margin-bottom:25px;"></div>
        <div id="rulesContent" style="font-size:22px; line-height:1.45;"></div>

    </div>
</div>


<!-- ================= Income popup. ================= -->
<div id="incomeModal" class="modal-backdrop" onclick="closeIncomeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">

        <span class="modal-close" onclick="closeIncomeModal()">✕</span>
        <h2 id="incomeTitle"></h2>

        <table style="width:100%; margin-top:20px; font-size:20px; border-collapse:collapse;">
            <thead>
            <tr style="border-bottom:2px solid #ccc;">
                <th id="col_round" style="padding:8px;"></th>
                <th id="col_profit" style="padding:8px;"></th>
                <th id="col_capital" style="padding:8px;"></th>
            </tr>
            </thead>
            <tbody id="incomeTableBody">
            <tr>
                <td colspan="3" style="text-align:center; padding:50px;">No Rows To Show</td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

<!-- ===== Player setup form. ===== -->
<section id="playerFormSection" class="form-section">

  <label id="playerNameLabel" class="form-label"></label>
  <input id="inputPlayerName"
         type="text"
         class="form-input">

  <label id="capitalLabel" class="form-label"></label>
  <input id="inputCapital"
         type="number"
         class="form-input">

  <div class="form-buttons">
    <button id="submitPlayerBtn" class="form-btn submit-btn">Submit</button>
    <button id="resetPlayerBtn" class="form-btn reset-btn">Reset</button>
  </div>

</section>

<!-- JS. -->
<script type="module">
    window.HOME_CONFIG = {};  // Store home page config data.

    import {loadHomeConfig} from "/static/js/api.js";
    import {
        openRulesModal, closeRulesModal, openIncomeModal, closeIncomeModal, switchRulesLang
    } from "/static/js/modals.js";

    // Send global functions to window.
    window.openRulesModal = openRulesModal;
    window.closeRulesModal = closeRulesModal;
    window.openIncomeModal = openIncomeModal;
    window.closeIncomeModal = closeIncomeModal;
    window.switchRulesLang = switchRulesLang;

    function validateInput(name, capital) {
        if (!window.HOME_CONFIG || Object.keys(window.HOME_CONFIG).length === 0) {
                alert("Config not loaded yet. Please wait 1 second and try again.");
                return false;
            }

        if (name.length > 0) { // If user does enter something.
            name = name.trim(); // Remove leading and trailing spaces.
            if (name.length <= 0) {
                alert(HOME_CONFIG.player_name_alert.min_error);
                return false;
            }
            if (name.length > HOME_CONFIG.max_name_len) {
                alert(HOME_CONFIG.player_name_alert.max_error);
                return false;
            }
        }

        capital = Number(capital);
        if (!Number.isInteger(capital)) {
            alert(HOME_CONFIG.capital_alert.int_error);
            return false;
        }
        if (capital < HOME_CONFIG.min_bet) {
            alert(HOME_CONFIG.capital_alert.min_error);
            return false;
        }
        if (capital > HOME_CONFIG.max_capital) {
            alert(HOME_CONFIG.capital_alert.max_error);
            return false;
        }

        return true;
    }

    /* -------- Initialize frontend w/ Python config. -------- */
    async function initHomePage() {
        const cfg = await loadHomeConfig();
        window.HOME_CONFIG = cfg;

        document.title = cfg.title;
        document.getElementById("pageName").innerHTML = cfg.name;

        /* ---------------- Top buttons. ---------------- */
        document.getElementById("introBtn").innerText = cfg.intro_button.label;
        document.getElementById("introBtn").onclick = () => {
            window.open(cfg.intro_button.url, "_blank");
        };

        document.getElementById("rulesBtn").innerText = cfg.rules_button.label;
        document.getElementById("rulesBtn").addEventListener("click", () => {
            openRulesModal();
            switchRulesLang("English"); // Default language.
        });

        document.getElementById("incomeBtn").innerText = cfg.income_button.label;
        document.getElementById("incomeBtn").onclick = openIncomeModal;

        /* ——— Rules popup. ——— */
        document.getElementById("rulesTitle").innerText = cfg.rules_button.title;

        const langDiv = document.getElementById("rulesLangButtons");
        langDiv.innerHTML = "";
        cfg.rules_button.language.forEach(lang => {
            langDiv.innerHTML += `
          <button class="rules-lang-btn"
                  onclick="switchRulesLang('${lang.label}')">
            ${lang.label}
          </button>
        `;
        });

        /* ——— Income popup. ——— */
        document.getElementById("incomeTitle").innerText = cfg.income_button.title;

        const cols = cfg.income_button.columns;
        document.getElementById("col_round").innerText = cols["round"];
        document.getElementById("col_profit").innerText = cols["profit"];
        document.getElementById("col_capital").innerText = cols["capital"];

        document.getElementById("playerNameLabel").innerHTML = cfg.player_name_input.label;
        document.getElementById("inputPlayerName").placeholder = cfg.player_name_input.holder;

        document.getElementById("capitalLabel").innerHTML = cfg.capital_input.label;
        document.getElementById("inputCapital").placeholder = cfg.capital_input.holder;

        document.getElementById("submitPlayerBtn").addEventListener("click", () => {
            let name = document.getElementById("inputPlayerName").value.trim();
            let capital = document.getElementById("inputCapital").value;

            if (!validateInput(name, capital)) return;

            if (name.length <= 0) { // If user doesn't enter name.
                name = HOME_CONFIG.default_player_name;
            }

            localStorage.setItem("player_name", name);
            localStorage.setItem("capital", capital);
            window.location.href = "/game"; // Jump to game.html.
        });

        document.getElementById("resetPlayerBtn").addEventListener("click", () => { // Reset player's input.
            document.getElementById("inputPlayerName").value = "";
            document.getElementById("inputCapital").value = "";
        });
    }

    initHomePage();
</script>

</body>

</html>
